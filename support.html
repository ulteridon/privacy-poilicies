<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support – ulteridon</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header a { color: white; text-decoration: none; font-size: 1.2rem; opacity: 0.8; }
    header a:hover { opacity: 1; }
    header span { opacity: 0.5; }
    main { max-width: 780px; margin: 2rem auto; padding: 0 1rem 3rem; }
    #content { background: white; border-radius: 8px; padding: 2rem 2.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    #content h1 { font-size: 1.6rem; margin-bottom: 1.2rem; color: #1a1a2e; }
    #content h2 { font-size: 1.15rem; margin: 1.5rem 0 0.6rem; color: #1a1a2e; }
    #content h3 { font-size: 1rem; margin: 1.2rem 0 0.4rem; }
    #content p { line-height: 1.7; margin-bottom: 0.8rem; }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.8rem; }
    #content li { line-height: 1.7; margin-bottom: 0.2rem; }
    #content a { color: #4a6cf7; }
    #content strong { font-weight: 600; }
    #content hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .error { color: #c0392b; padding: 1rem; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">&#8592;</a>
    <span>Support</span>
  </header>
  <main>
    <div id="content">Loading...</div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file || !file.endsWith('.md') || file.includes('/') || file.includes('..')) {
      document.getElementById('content').innerHTML = '<p class="error">Invalid file.</p>';
    } else {
      fetch(file)
        .then(r => { if (!r.ok) throw new Error('Not found'); return r.text(); })
        .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
        .catch(() => { document.getElementById('content').innerHTML = '<p class="error">Could not load support page.</p>'; });
    }
  </script>
</body>
</html>
